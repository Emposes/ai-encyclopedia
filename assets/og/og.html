<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; background: #000; overflow: hidden;
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif; position: relative; }
  .dots { position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(166,242,204,0.16) 1.5px, transparent 1.5px);
    background-size: 36px 36px; }
  .glow { position: absolute; right: -160px; top: -160px; width: 640px; height: 640px;
    background: radial-gradient(circle, rgba(43,89,69,0.55), transparent 65%); }
  .vign { position: absolute; inset: 0; background: radial-gradient(ellipse 75% 70% at 38% 45%, transparent 35%, #000 100%); }
  .wrap { position: absolute; inset: 0; padding: 64px 72px; display: flex; flex-direction: column; }
  .mark { display: flex; align-items: center; gap: 12px;
    font-family: "SF Mono", Menlo, monospace; font-size: 18px; letter-spacing: 0.2em; color: #fff; }
  .mark .tick { width: 14px; height: 14px; background: #a6f2cc; }
  .mark .v { color: #636363; margin-left: auto; letter-spacing: 0.14em; }
  h1 { margin-top: 84px; font-size: 122px; font-weight: 800; line-height: 0.95;
    letter-spacing: -0.03em; color: #fff; }
  h1 em { font-style: normal; color: #a6f2cc; }
  .sub { margin-top: 28px; font-size: 27px; color: #9b9b9b; letter-spacing: 0.01em; }
  .stats { margin-top: auto; display: flex; gap: 0; border: 1px solid #2f3234; }
  .stat { flex: 1; padding: 20px 24px; border-right: 1px solid #2f3234; }
  .stat:last-child { border-right: 0; }
  .stat b { display: block; font-size: 30px; font-weight: 800; color: #a6f2cc; letter-spacing: -0.01em; }
  .stat span { display: block; margin-top: 4px; font-family: "SF Mono", Menlo, monospace;
    font-size: 11.5px; letter-spacing: 0.16em; color: #636363; }
</style>
</head>
<body>
  <div class="dots"></div>
  <div class="glow"></div>
  <div class="vign"></div>
  <div class="wrap">
    <div class="mark"><span class="tick"></span>AI // ENCYCLOPEDIA<span class="v">FREE · OPEN SOURCE</span></div>
    <h1>THE AI<br/>ENCYCLOPEDIA<em>.</em></h1>
    <div class="sub">First principles to frontier — interactive, with runnable Python.</div>
    <div class="stats">
      <div class="stat"><b>4 + GYM</b><span>VOLUMES</span></div>
      <div class="stat"><b>32</b><span>CHAPTERS</span></div>
      <div class="stat"><b>70+</b><span>LIVE INSTRUMENTS</span></div>
      <div class="stat"><b>150+</b><span>EQUATIONS</span></div>
      <div class="stat"><b>$0</b><span>FOREVER</span></div>
    </div>
  </div>
</body>
</html>
